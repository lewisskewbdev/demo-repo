<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contact — Demo Portfolio</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="logo">Demo Portfolio</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="creations.html">Creations</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section>
      <h2>Get in touch</h2>
      <p>Use the form below or send an email directly to <a href="mailto:you@example.com">you@example.com</a>.</p>

      <form action="https://formspree.io/f/your-form-id" method="POST" class="card">
        <label>
          Name
          <input type="text" name="name" required>
        </label>
        <label>
          Email
          <input type="email" name="email" required>
        </label>
        <label>
          Message
          <textarea name="message" rows="6" required></textarea>
        </label>
        <p><button class="btn" type="submit">Send message</button> <span class="muted">Or <a href="mailto:you@example.com">email me</a></span></p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© <span id="year"></span> Lewis — Demo Portfolio</p>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
