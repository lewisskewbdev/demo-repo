<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to My Site</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
            text-align: center;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        
        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s ease;
        }
        
        button:hover {
            background: #764ba2;
        }
        
        #output {
            margin-top: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 5px;
            min-height: 60px;
            color: #333;
        }
        
        .counter {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome! 👋</h1>
        <p>This is a basic website hosted on GitHub Pages. Click the buttons below to interact with this page.</p>
        
        <div class="button-group">
            <button onclick="greet()">Say Hello</button>
            <button onclick="increment()">Click Me!</button>
            <button onclick="resetCounter()">Reset</button>
        </div>
        
        <div id="output">
            <p>Click a button to see something happen!</p>
        </div>
    </div>

    <script>
        let counter = 0;

        function greet() {
            const now = new Date();
            const hour = now.getHours();
            let greeting;

            if (hour < 12) {
                greeting = 'Good morning! ☀️';
            } else if (hour < 18) {
                greeting = 'Good afternoon! 🌤️';
            } else {
                greeting = 'Good evening! 🌙';
            }

            document.getElementById('output').innerHTML = `<p>${greeting}</p>`;
        }

        function increment() {
            counter++;
            document.getElementById('output').innerHTML = 
                `<p>You clicked the button <span class="counter">${counter}</span> times!</p>`;
        }

        function resetCounter() {
            counter = 0;
            document.getElementById('output').innerHTML = 
                `<p>Counter reset! Click Me! to start again.</p>`;
        }
    </script>
</body>
</html>
